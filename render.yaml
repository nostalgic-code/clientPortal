services:
  - type: web
    name: client-portal-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: client-portal-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app

databases:
  - name: client-portal-db
    databaseName: portal
    user: portal
